# Jaeger v2 alert rules are defined as declarative Pyrra SLOs
# in the pyrra/ directory. Pyrra generates multi-window, multi-burn-rate
# Prometheus alert rules automatically from those definitions.
#
# See pyrra/slo-receiver-success.yaml  — span ingest success rate
#     pyrra/slo-exporter-success.yaml  — span export success rate
#     pyrra/slo-query-success.yaml     — query API success rate
#
# The following v1 alerts were removed because the metrics they
# referenced (jaeger_agent_*, jaeger_client_*, jaeger_collector_*,
# jaeger_sampler_*, jaeger_throttler_*) are not emitted by Jaeger v2:
#
#   - JaegerHTTPServerErrs        (agent removed in v2)
#   - JaegerRPCRequestsErrors     (client SDK metric, not in v2)
#   - JaegerClientSpansDropped    (client SDK metric, not in v2)
#   - JaegerAgentSpansDropped     (agent removed in v2)
#   - JaegerCollectorDroppingSpans → pyrra/slo-receiver-success.yaml
#   - JaegerSamplingUpdateFailing (client SDK metric, not in v2)
#   - JaegerThrottlingUpdateFailing (client SDK metric, not in v2)
#   - JaegerQueryReqsFailing      → pyrra/slo-query-success.yaml

"groups": []
