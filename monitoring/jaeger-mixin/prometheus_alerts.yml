#
# This file is generated from the Pyrra SLO definitions in the pyrra/
# directory. Do not edit manually. To regenerate, run:
#
#   make generate-alerts
#
# The following v1 alerts were removed because the metrics they
# referenced (jaeger_agent_*, jaeger_client_*, jaeger_collector_*,
# jaeger_sampler_*, jaeger_throttler_*) are not emitted by Jaeger v2:
#
#   - JaegerHTTPServerErrs        (agent removed in v2)
#   - JaegerRPCRequestsErrors     (client SDK metric, not in v2)
#   - JaegerClientSpansDropped    (client SDK metric, not in v2)
#   - JaegerAgentSpansDropped     (agent removed in v2)
#   - JaegerCollectorDroppingSpans → pyrra/slo-receiver-success.yaml
#   - JaegerSamplingUpdateFailing (client SDK metric, not in v2)
#   - JaegerThrottlingUpdateFailing (client SDK metric, not in v2)
#   - JaegerQueryReqsFailing      → pyrra/slo-query-success.yaml

groups:
- interval: 2m30s
  name: jaeger-exporter-success-increase
  rules:
  - expr: sum(increase(otelcol_exporter_sent_spans_total{job="jaeger"}[4w]))
    labels:
      job: jaeger
      slo: jaeger-exporter-success
    record: otelcol_exporter_sent_spans:increase4w
  - alert: SLOMetricAbsent
    expr: absent(otelcol_exporter_sent_spans_total{job="jaeger"}) == 1
    for: 10m
    labels:
      job: jaeger
      severity: critical
      slo: jaeger-exporter-success
  - expr: sum(increase(otelcol_exporter_send_failed_spans_total{job="jaeger"}[4w]))
    labels:
      job: jaeger
      slo: jaeger-exporter-success
    record: otelcol_exporter_send_failed_spans:increase4w
  - alert: SLOMetricAbsent
    expr: absent(otelcol_exporter_send_failed_spans_total{job="jaeger"}) == 1
    for: 10m
    labels:
      job: jaeger
      severity: critical
      slo: jaeger-exporter-success
- interval: 30s
  name: jaeger-exporter-success
  rules:
  - expr: sum(rate(otelcol_exporter_send_failed_spans_total{job="jaeger"}[5m])) /
      sum(rate(otelcol_exporter_sent_spans_total{job="jaeger"}[5m]))
    labels:
      job: jaeger
      slo: jaeger-exporter-success
    record: otelcol_exporter_sent_spans:burnrate5m
  - expr: sum(rate(otelcol_exporter_send_failed_spans_total{job="jaeger"}[30m])) /
      sum(rate(otelcol_exporter_sent_spans_total{job="jaeger"}[30m]))
    labels:
      job: jaeger
      slo: jaeger-exporter-success
    record: otelcol_exporter_sent_spans:burnrate30m
  - expr: sum(rate(otelcol_exporter_send_failed_spans_total{job="jaeger"}[1h])) /
      sum(rate(otelcol_exporter_sent_spans_total{job="jaeger"}[1h]))
    labels:
      job: jaeger
      slo: jaeger-exporter-success
    record: otelcol_exporter_sent_spans:burnrate1h
  - expr: sum(rate(otelcol_exporter_send_failed_spans_total{job="jaeger"}[2h])) /
      sum(rate(otelcol_exporter_sent_spans_total{job="jaeger"}[2h]))
    labels:
      job: jaeger
      slo: jaeger-exporter-success
    record: otelcol_exporter_sent_spans:burnrate2h
  - expr: sum(rate(otelcol_exporter_send_failed_spans_total{job="jaeger"}[6h])) /
      sum(rate(otelcol_exporter_sent_spans_total{job="jaeger"}[6h]))
    labels:
      job: jaeger
      slo: jaeger-exporter-success
    record: otelcol_exporter_sent_spans:burnrate6h
  - expr: sum(rate(otelcol_exporter_send_failed_spans_total{job="jaeger"}[1d])) /
      sum(rate(otelcol_exporter_sent_spans_total{job="jaeger"}[1d]))
    labels:
      job: jaeger
      slo: jaeger-exporter-success
    record: otelcol_exporter_sent_spans:burnrate1d
  - expr: sum(rate(otelcol_exporter_send_failed_spans_total{job="jaeger"}[4d])) /
      sum(rate(otelcol_exporter_sent_spans_total{job="jaeger"}[4d]))
    labels:
      job: jaeger
      slo: jaeger-exporter-success
    record: otelcol_exporter_sent_spans:burnrate4d
  - alert: ErrorBudgetBurn
    expr: otelcol_exporter_sent_spans:burnrate5m{job="jaeger",slo="jaeger-exporter-success"}
      > (14 * (1-0.99)) and otelcol_exporter_sent_spans:burnrate1h{job="jaeger",slo="jaeger-exporter-success"}
      > (14 * (1-0.99))
    for: 2m0s
    labels:
      exhaustion: 2d
      job: jaeger
      long: 1h
      severity: critical
      short: 5m
      slo: jaeger-exporter-success
  - alert: ErrorBudgetBurn
    expr: otelcol_exporter_sent_spans:burnrate30m{job="jaeger",slo="jaeger-exporter-success"}
      > (7 * (1-0.99)) and otelcol_exporter_sent_spans:burnrate6h{job="jaeger",slo="jaeger-exporter-success"}
      > (7 * (1-0.99))
    for: 15m0s
    labels:
      exhaustion: 4d
      job: jaeger
      long: 6h
      severity: critical
      short: 30m
      slo: jaeger-exporter-success
  - alert: ErrorBudgetBurn
    expr: otelcol_exporter_sent_spans:burnrate2h{job="jaeger",slo="jaeger-exporter-success"}
      > (2 * (1-0.99)) and otelcol_exporter_sent_spans:burnrate1d{job="jaeger",slo="jaeger-exporter-success"}
      > (2 * (1-0.99))
    for: 1h0m0s
    labels:
      exhaustion: 2w
      job: jaeger
      long: 1d
      severity: warning
      short: 2h
      slo: jaeger-exporter-success
  - alert: ErrorBudgetBurn
    expr: otelcol_exporter_sent_spans:burnrate6h{job="jaeger",slo="jaeger-exporter-success"}
      > (1 * (1-0.99)) and otelcol_exporter_sent_spans:burnrate4d{job="jaeger",slo="jaeger-exporter-success"}
      > (1 * (1-0.99))
    for: 3h0m0s
    labels:
      exhaustion: 4w
      job: jaeger
      long: 4d
      severity: warning
      short: 6h
      slo: jaeger-exporter-success
