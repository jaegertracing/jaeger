# UC-3: Proxy rewrites an external prefix to a different internal prefix.
# Jaeger runs with --query.base-path=/internal.
# httpd rewrites /external/ → http://jaeger:16686/internal/.
# Access: http://localhost:18082/external/
services:
  jaeger:
    image: ${JAEGER_IMAGE:-jaegertracing/jaeger:latest}
    command: "--set extensions.jaeger_query.base_path=/internal"
    networks: [net]
  httpd:
    image: httpd:latest
    ports: ["18082:80"]
    volumes:
      - "./httpd.conf:/usr/local/apache2/conf/httpd.conf"
    depends_on: [jaeger]
    networks: [net]
networks:
  net: {}
