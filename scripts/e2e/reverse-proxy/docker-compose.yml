# Single compose file for all three reverse-proxy use cases (ADR-009).
# Each UC gets its own isolated network so httpd configs can all use
# the alias "jaeger" for the backend without name collisions.
#
#   UC-1 (port 18080): proxy forwards prefix unchanged
#   UC-2 (port 18081): single pod, two external prefixes
#   UC-3 (port 18082): proxy rewrites external prefix to different internal prefix

services:
  # ---------------------------------------------------------------------------
  # UC-1: prefix-forwarding proxy
  #   Jaeger: --query.base-path=/jaeger/prefix
  #   httpd:  ProxyPass /jaeger/prefix → http://jaeger:16686/jaeger/prefix
  # ---------------------------------------------------------------------------
  jaeger-uc1:
    image: ${JAEGER_IMAGE:-jaegertracing/jaeger:latest}
    command: "--set extensions.jaeger_query.base_path=/jaeger/prefix"
    networks:
      uc1:
        aliases: [jaeger]

  httpd-uc1:
    image: httpd:latest
    ports: ["18080:80"]
    volumes:
      - "../../../examples/reverse-proxy/httpd.conf:/usr/local/apache2/conf/httpd.conf"
    depends_on: [jaeger-uc1]
    networks: [uc1]

  # ---------------------------------------------------------------------------
  # UC-2: single pod, two external prefixes
  #   Jaeger: no base-path (serves at root /)
  #   httpd:  /alt/ → http://jaeger:16686/  (strips prefix)
  #           /     → http://jaeger:16686/  (pass-through)
  # ---------------------------------------------------------------------------
  jaeger-uc2:
    image: ${JAEGER_IMAGE:-jaegertracing/jaeger:latest}
    networks:
      uc2:
        aliases: [jaeger]

  httpd-uc2:
    image: httpd:latest
    ports: ["18081:80"]
    volumes:
      - "./uc2/httpd.conf:/usr/local/apache2/conf/httpd.conf"
    depends_on: [jaeger-uc2]
    networks: [uc2]

  # ---------------------------------------------------------------------------
  # UC-3: proxy rewrites external prefix to different internal prefix
  #   Jaeger: --query.base-path=/internal
  #   httpd:  /external/ → http://jaeger:16686/internal/
  # ---------------------------------------------------------------------------
  jaeger-uc3:
    image: ${JAEGER_IMAGE:-jaegertracing/jaeger:latest}
    command: "--set extensions.jaeger_query.base_path=/internal"
    networks:
      uc3:
        aliases: [jaeger]

  httpd-uc3:
    image: httpd:latest
    ports: ["18082:80"]
    volumes:
      - "./uc3/httpd.conf:/usr/local/apache2/conf/httpd.conf"
    depends_on: [jaeger-uc3]
    networks: [uc3]

networks:
  uc1: {}
  uc2: {}
  uc3: {}
