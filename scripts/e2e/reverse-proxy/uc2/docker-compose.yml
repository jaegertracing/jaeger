# UC-2: Single Jaeger pod served under two different external prefixes simultaneously.
# Jaeger runs at root / (no base-path flag).
# httpd forwards:
#   /alt/ → http://jaeger:16686/  (strips /alt)
#   /     → http://jaeger:16686/  (pass-through)
# Access: http://localhost:18081/ and http://localhost:18081/alt/
services:
  jaeger:
    image: ${JAEGER_IMAGE:-jaegertracing/jaeger:latest}
    networks: [net]
  httpd:
    image: httpd:latest
    ports: ["18081:80"]
    volumes:
      - "./httpd.conf:/usr/local/apache2/conf/httpd.conf"
    depends_on: [jaeger]
    networks: [net]
networks:
  net: {}
