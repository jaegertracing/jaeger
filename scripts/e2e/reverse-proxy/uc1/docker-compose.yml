# UC-1: Proxy forwards the URL prefix unchanged to Jaeger.
# Jaeger is started with --query.base-path=/jaeger/prefix.
# httpd forwards /jaeger/prefix → http://jaeger:16686/jaeger/prefix (no rewrite).
# Access: http://localhost:18080/jaeger/prefix/
#
# Uses the existing examples/reverse-proxy/httpd.conf (same prefix on both sides).
services:
  jaeger:
    image: ${JAEGER_IMAGE:-jaegertracing/jaeger:latest}
    command: "--set extensions.jaeger_query.base_path=/jaeger/prefix"
    networks: [net]
  httpd:
    image: httpd:latest
    ports: ["18080:80"]
    volumes:
      - "../../../../examples/reverse-proxy/httpd.conf:/usr/local/apache2/conf/httpd.conf"
    depends_on: [jaeger]
    networks: [net]
networks:
  net: {}
