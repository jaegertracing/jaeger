services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.12.1@sha256:7234d193fbeb3a375f21f0bb99040396f68bb2e82cada4f4947d7fcf9638bbf3
    container_name: clickhouse
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=password
      - CLICKHOUSE_DB=jaeger
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query=SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    profiles: [quickstart]
    image: cr.jaegertracing.io/jaegertracing/jaeger:${JAEGER_VERSION:-latest}
    volumes:
      - ../../cmd/jaeger/config-clickhouse.yaml:/etc/jaeger/config.yaml
    command:
      - "--config=/etc/jaeger/config.yaml"
      - "--feature-gates=storage.clickhouse"
    environment:
      - CLICKHOUSE_ADDRESS=clickhouse:9000
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    depends_on:
      clickhouse:
        condition: service_healthy

  tracegen:
    profiles: [quickstart]
    image: cr.jaegertracing.io/jaegertracing/jaeger-tracegen:${JAEGER_VERSION:-latest}
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      - jaeger
