# Config for e2e testing the auto_rollover rotation strategy on OpenSearch.
# Uses a unique index_prefix to avoid collision with other tests.

service:
  extensions: [jaeger_storage, jaeger_query, healthcheckv2]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]
  telemetry:
    resource:
      service.name: jaeger
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    logs:
      level: debug

extensions:
  healthcheckv2:
    use_v2: true
    http:

  jaeger_query:
    storage:
      traces: some_storage
    ui:
      config_file: ./cmd/jaeger/config-ui.json

  jaeger_storage:
    backends:
      some_storage:
        opensearch:
          server_urls:
            - http://localhost:9200
          indices:
            index_prefix: "jaeger-ar"
            spans:
              shards: 1
              replicas: 0
              rotation:
                auto_rollover:
                  policy_name: "jaeger-test-ilm-policy"
            services:
              shards: 1
              replicas: 0
              rotation:
                auto_rollover:
                  policy_name: "jaeger-test-ilm-policy"
            dependencies:
              shards: 1
              replicas: 0
              rotation:
                auto_rollover:
                  policy_name: "jaeger-test-ilm-policy"
            sampling:
              shards: 1
              replicas: 0
              rotation:
                auto_rollover:
                  policy_name: "jaeger-test-ilm-policy"

receivers:
  otlp:
    protocols:
      grpc:
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:

exporters:
  jaeger_storage_exporter:
    trace_storage: some_storage
