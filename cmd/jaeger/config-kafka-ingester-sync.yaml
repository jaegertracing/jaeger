# At-least-once Kafka ingester topology (RFC 0007 §4.5).
#
# For a Kafka-buffered deployment to guarantee at-least-once delivery, three
# settings must line up so that a Kafka offset is committed only after the spans
# it covers are durably written:
#
#   1. elasticsearch.write_mode: sync — each batch is written with one blocking
#      _bulk request, so a write failure surfaces to the pipeline instead of being
#      swallowed by the async bulk buffer.
#   2. The storage exporter blocks on the write result (queue.wait_for_result:
#      true) and does the batching itself (queue.batch), so there is NO pipeline
#      `batch` processor — a `batch` processor acks the receiver before the write
#      and would decouple the offset from durability.
#   3. The Kafka receiver marks offsets only after successful processing
#      (message_marking.after: true, on_error: false).
#
# Any one of these missing silently degrades the guarantee. Note that a *permanent*
# rejection (e.g. a mapping conflict) still blocks the partition here — autonomous
# dead-lettering that lets the partition progress is a later milestone (RFC 0007
# §4.8 / M6).

service:
  extensions: [jaeger_storage, jaeger_query, healthcheckv2]
  pipelines:
    traces:
      receivers: [kafka]
      # No `batch` processor: batching happens in the exporter's sending queue so
      # the Kafka offset stays coupled to the write result.
      processors: []
      exporters: [jaeger_storage_exporter]
  telemetry:
    resource:
      service.name: jaeger
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                # use different port to avoid conflict with collector
                port: 8889
    logs:
      level: info

extensions:
  healthcheckv2:
    use_v2: true
    http:
      # use different port to avoid conflict with collector
      endpoint: 0.0.0.0:14133

  jaeger_query:
    storage:
      traces: some_storage

  jaeger_storage:
    backends:
      some_storage:
        elasticsearch:
          server_urls:
            - http://localhost:9200
          # Write each batch with one blocking _bulk request so failures are
          # observable to the pipeline (RFC 0007).
          write_mode: sync
          bulk_processing:
            # Per-request byte cap of the synchronous writer. queue.batch.max_size
            # below must not exceed this, or an oversized batch would be split into
            # several _bulk requests and lose per-batch atomicity — the exporter
            # hard-fails startup if it does.
            max_bytes: 5000000

receivers:
  kafka:
    brokers:
      - localhost:9092
    traces:
      topics:
        - ${env:KAFKA_TOPIC:-jaeger-spans}
      encoding: ${env:KAFKA_ENCODING:-otlp_proto}
    initial_offset: earliest
    # Commit an offset only after the spans it covers are durably written.
    message_marking:
      after: true
      on_error: false

processors:

exporters:
  jaeger_storage_exporter:
    trace_storage: some_storage
    # Block the receiver on the write result and batch inside the queue, replacing
    # the pipeline `batch` processor. Sizes are in bytes to stay comparable with
    # the storage's bulk_processing.max_bytes.
    queue:
      wait_for_result: true
      sizer: bytes
      num_consumers: 1
      queue_size: 104857600 # 100 MiB of buffered spans
      batch:
        sizer: bytes
        flush_timeout: 200ms # flush a partial batch after this long
        min_size: 1048576 # 1 MiB
        max_size: 4194304 # 4 MiB, must be <= bulk_processing.max_bytes above
