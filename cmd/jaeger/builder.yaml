# Reference builder.yaml for assembling Jaeger using ocb (OpenTelemetry Collector Builder).
# This manifest reproduces the default Jaeger production distribution and serves as
# both documentation and a CI validation artifact.
# Note: test-only components (e.g., storagecleaner) are intentionally excluded.
#
# Usage:
#   ocb --config cmd/jaeger/builder.yaml
#
# To add custom components, copy this file and append entries to the relevant
# section (extensions, receivers, exporters, processors, connectors).
#
# Cross-compilation is supported via GOOS/GOARCH environment variables:
#   GOOS=linux GOARCH=arm64 ocb --config cmd/jaeger/builder.yaml
#
# All component versions are managed by Jaeger's go.mod (via renovatebot),
# so this file never needs version bumps for existing components.

dist:
  module: github.com/jaegertracing/jaeger/cmd/jaeger/ocb-build
  name: jaeger
  description: Jaeger - distributed tracing platform
  output_path: ./cmd/jaeger/_build

telemetry:
  gomod: github.com/jaegertracing/jaeger v0.0.0
  import: github.com/jaegertracing/jaeger/components/telemetry

extensions:
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/healthcheckv2extension
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/pprofextension
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/zpagesextension
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/basicauthextension
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/sigv4authextension
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/jaegermcp
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/jaegerquery
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/jaegerstorage
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/remotesampling
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/expvar
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/remotestorage

receivers:
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/receiver/otlpreceiver
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/receiver/nopreceiver
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/receiver/jaegerreceiver
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/receiver/kafkareceiver
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/receiver/zipkinreceiver

exporters:
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/debugexporter
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/otlpexporter
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/otlphttpexporter
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/nopexporter
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/storageexporter
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/kafkaexporter
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/prometheusexporter

processors:
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/processor/batchprocessor
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/processor/memorylimiterprocessor
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/processor/tailsamplingprocessor
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/processor/attributesprocessor
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/processor/filterprocessor
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/processor/adaptivesampling

connectors:
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/connector/forwardconnector
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/connector/spanmetricsconnector

replaces:
  - github.com/jaegertracing/jaeger v0.0.0 => ../../../
