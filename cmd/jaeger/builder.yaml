# Reference builder.yaml for assembling Jaeger using ocb (OpenTelemetry Collector Builder).
# This manifest reproduces the default Jaeger distribution and serves as both
# documentation and a CI validation artifact.
#
# Usage:
#   ocb --config cmd/jaeger/builder.yaml
#
# To add custom components, copy this file and append entries to the relevant
# section (extensions, receivers, exporters, processors, connectors).
#
# Cross-compilation is supported via GOOS/GOARCH environment variables:
#   GOOS=linux GOARCH=arm64 ocb --config cmd/jaeger/builder.yaml
#
# All component versions are managed by Jaeger's go.mod (via renovatebot),
# so this file never needs version bumps for existing components.

dist:
  module: github.com/jaegertracing/jaeger/cmd/jaeger/ocb-build
  name: jaeger
  description: Jaeger - distributed tracing platform
  output_path: ./cmd/jaeger/_build

telemetry:
  gomod: github.com/jaegertracing/jaeger v0.0.0
  import: github.com/jaegertracing/jaeger/components/telemetry

extensions:
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/healthcheckv2
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/pprof
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/zpages
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/basicauth
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/sigv4auth
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/jaegermcp
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/jaegerquery
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/jaegerstorage
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/remotesampling
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/expvar
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/extension/remotestorage

receivers:
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/receiver/otlp
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/receiver/nop
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/receiver/jaeger
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/receiver/kafka
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/receiver/zipkin

exporters:
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/debug
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/otlp
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/otlphttp
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/nop
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/storageexporter
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/kafka
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/exporter/prometheus

processors:
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/processor/batch
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/processor/memorylimiter
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/processor/tailsampling
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/processor/attributes
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/processor/filter
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/processor/adaptivesampling

connectors:
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/connector/forward
  - gomod: github.com/jaegertracing/jaeger v0.0.0
    import: github.com/jaegertracing/jaeger/components/connector/spanmetrics

replaces:
  - github.com/jaegertracing/jaeger v0.0.0 => ../../../
