service:
  extensions: [jaeger_storage, jaeger_query]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]

extensions:
  jaeger_query:
    trace_storage: some_storage
    trace_storage_archive: another_storage
    ui_config: ./cmd/jaeger/config-ui.json

  jaeger_storage:
    backends:
      some_storage:
        elasticsearch:
          index_prefix: "jaeger-main"
#          indices:
#            spans:
#              date_layout: "2006-01-02"
#              rollover_frequency: "hour"
#            services:
#              date_layout: "2006-01-02"
#              rollover_frequency: "hour"
#            dependencies:
#              date_layout: "2006-01-02"
#              rollover_frequency: "hour"
#            sampling:
#              date_layout: "2006-01-02"
#              rollover_frequency: "hour"
      another_storage:
        elasticsearch:
          index_prefix: "jaeger-archive"

receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  batch:

exporters:
  jaeger_storage_exporter:
    trace_storage: some_storage
