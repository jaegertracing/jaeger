name: 'Setup Node.js'
description: 'Setup Node.js and pnpm as required by jaeger-ui repo. Must be called after checkout with submodules.'
runs:
  using: "composite"
  steps:
    # pnpm must be installed before setup-node. The pnpm version is read from the
    # "packageManager" field in jaeger-ui's package.json, keeping it deterministic.
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        package_json_file: jaeger-ui/package.json

    # The Node.js version comes from jaeger-ui's package.json "engines" field.
    # No dependency cache: the UI build usually downloads prebuilt release assets
    # (see rebuild-ui.sh) and never runs `pnpm install`, so there is no pnpm store
    # to cache, and a cache-save step would fail on the missing path.
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: jaeger-ui/package.json

    - name: Print node and pnpm versions
      shell: bash
      run: node --version && pnpm --version
