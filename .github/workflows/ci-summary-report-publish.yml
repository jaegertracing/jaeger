# CI Summary Report (Publish): posts PR comments and check runs from the
# pre-computed ci-summary artifact produced by ci-summary-report.yml.
#
# Triggered by workflow_run on CI Orchestrator completion (success OR failure).
# pull_request workflows from forks run with read-only permissions regardless of
# what the workflow file declares, so they cannot post PR comments or check runs.
# workflow_run always executes in the base repository context and gets the
# permissions declared here — that is why posting is split into this workflow.
# The heavy computation runs inside the CI Orchestrator itself (ci-summary-report.yml),
# making gate failures immediately visible in the PR Checks table without waiting
# for this workflow's separate approval step.
#
# Design: docs/adr/004-migrating-coverage-gating-to-github-actions.md
# Security model: see .github/scripts/ci-summary-report-publish.js

name: CI Summary Report (Publish)
run-name: Report for ${{ github.event.workflow_run.display_title }}
on:
  workflow_run:
    workflows: ["CI Orchestrator"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI Orchestrator run ID to publish summary for'
        required: true
      pr_number:
        description: 'PR number to post summary report for'
        required: true
permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read
jobs:
  publish:
    name: Post Summary
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      # Resolve the CI Orchestrator run ID so the artifact can be downloaded.
      # For workflow_dispatch, pr_number is validated here from the user input.
      - name: Resolve source run
        id: source-run
        run: |
          STEP_OUTPUTS=$(mktemp)

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            RUN_ID="${{ github.event.inputs.run_id }}"
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            for var in RUN_ID PR_NUMBER; do
              if ! [[ "${!var}" =~ ^[1-9][0-9]*$ ]]; then
                echo "::error::Invalid $var input: must be a positive integer, got: '${!var}'"
                exit 1
              fi
            done
            echo "pr_number=$PR_NUMBER" >> "$STEP_OUTPUTS"
          else
            RUN_ID="${{ github.event.workflow_run.id }}"
          fi

          echo "run_id=$RUN_ID" >> "$STEP_OUTPUTS"
          echo "source_run_url=https://github.com/${{ github.repository }}/actions/runs/$RUN_ID" >> "$STEP_OUTPUTS"
          echo "summary_run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$STEP_OUTPUTS"

          cat "$STEP_OUTPUTS"
          cat "$STEP_OUTPUTS" >> "$GITHUB_OUTPUT"

      # Checkout the base repo so that .github/scripts/ci-summary-report-publish.js
      # is available for require() in the github-script step below.
      # Do NOT checkout the PR head: this workflow must only run base-repo code.
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      # Download the ci-summary artifact (pre-computed by ci-summary-report.yml).
      # head_sha and pr_number are read from ci-summary.json in the next step.
      # head_sha written into the artifact uses github.event.pull_request.head.sha
      # (PR branch-tip, not the synthetic merge commit) so check runs are posted
      # against the SHA that branch-protection evaluates.
      - name: Download CI summary artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download "${{ steps.source-run.outputs.run_id }}" \
            --repo "${{ github.repository }}" \
            --name ci-summary \
            --dir .artifacts \
          || echo "::warning::ci-summary artifact not found; proceeding without summary artifact (later checks may fail)."

      # Read head_sha and pr_number from the artifact.
      # For workflow_dispatch, pr_number is already set from the input (source-run),
      # but head_sha still comes from the artifact so we don't need an extra API call.
      # head_sha is validated as a 40-char hex SHA before use; if the artifact is
      # missing or contains no valid SHA, fall back to workflow_run.head_sha so the
      # handler is always invoked and can post "failure" check runs (instead of
      # silently leaving required checks absent at "Expected").
      - name: Read run info from artifact
        id: run-info
        run: |
          STEP_OUTPUTS=$(mktemp)
          HEAD_SHA=""
          PR_NUMBER=""
          if [ -f .artifacts/ci-summary.json ]; then
            RAW_SHA=$(jq -r '.head_sha // empty' .artifacts/ci-summary.json 2>/dev/null || true)
            if [[ "$RAW_SHA" =~ ^[0-9a-f]{40}$ ]]; then
              HEAD_SHA="$RAW_SHA"
            elif [ -n "$RAW_SHA" ]; then
              echo "::warning::head_sha in artifact ('$RAW_SHA') is not a valid 40-char hex SHA; will use fallback."
            fi
            PR_NUMBER=$(jq -r '.pr_number // empty' .artifacts/ci-summary.json 2>/dev/null || true)
          else
            echo "::warning::ci-summary.json not found; PR comment and check runs may be affected."
          fi
          # For workflow_run events, fall back to workflow_run.head_sha when the
          # artifact is missing or contains no valid SHA.  This may be the synthetic
          # merge commit, but it is better than leaving required checks at "Expected".
          if [ -z "$HEAD_SHA" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
            echo "::warning::Using workflow_run.head_sha as fallback (may be synthetic merge commit)."
          fi
          if [ -n "$HEAD_SHA" ]; then
            echo "head_sha=$HEAD_SHA" >> "$STEP_OUTPUTS"
          fi
          if [ -n "$PR_NUMBER" ]; then
            echo "pr_number=$PR_NUMBER" >> "$STEP_OUTPUTS"
          fi
          cat "$STEP_OUTPUTS"
          cat "$STEP_OUTPUTS" >> "$GITHUB_OUTPUT"

      - name: Post PR comment and create check runs
        if: steps.run-info.outputs.head_sha
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const handler = require('./.github/scripts/ci-summary-report-publish.js');
            await handler({
              github, core, fs: require('fs'),
              inputs: {
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                headSha:     '${{ steps.run-info.outputs.head_sha }}',
                prNumber:    '${{ steps.source-run.outputs.pr_number || steps.run-info.outputs.pr_number }}',
                ciRunUrl:    '${{ steps.source-run.outputs.source_run_url }}',
                publishUrl:  '${{ steps.source-run.outputs.summary_run_url }}',
                sourceRunId: '${{ steps.source-run.outputs.run_id }}',
              },
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
