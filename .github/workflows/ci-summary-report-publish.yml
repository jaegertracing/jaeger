# CI Summary Report (Publish): posts PR comments and check runs from the
# pre-computed ci-summary artifact produced by ci-summary-report.yml.
#
# Triggered by workflow_run on CI Orchestrator completion (success OR failure).
# pull_request workflows from forks run with read-only permissions regardless of
# what the workflow file declares, so they cannot post PR comments or check runs.
# workflow_run always executes in the base repository context and gets the
# permissions declared here — that is why posting is split into this workflow.
# The heavy computation runs inside the CI Orchestrator itself (ci-summary-report.yml),
# making gate failures immediately visible in the PR Checks table without waiting
# for this workflow's separate approval step.
#
# Design: docs/adr/004-migrating-coverage-gating-to-github-actions.md
#
# SECURITY WARNING — INJECTION RISK
#
# This workflow runs in the BASE REPOSITORY context with write permissions
# (pull-requests: write, checks: write). It downloads the ci-summary artifact
# produced by a PR's CI run, which may originate from a FORK and therefore
# contain UNTRUSTED content crafted by the PR author.
#
# NEVER interpolate artifact content verbatim into PR comments, check run
# summaries, or any GitHub API call. Doing so allows a malicious PR to inject
# arbitrary Markdown or URLs into the repository's UI.
#
# Required pattern:
#   1. The ci-summary artifact must contain ONLY structured data
#      (numbers, booleans, and fixed enum strings like "success"/"failure").
#   2. All display text (PR comments, check summaries) must be constructed
#      entirely from trusted template strings defined in this file.
#   3. Numeric values from the artifact must be coerced with Number() and
#      validated with Number.isFinite() before use.
#   4. Boolean values must be compared with === true (not !! which coerces strings).
#   5. String values from the artifact must ONLY be used in comparisons
#      (=== 'success'), never interpolated into output strings.

name: CI Summary Report (Publish)
on:
  workflow_run:
    workflows: ["CI Orchestrator"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to post summary report for'
        required: true
permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read
jobs:
  publish:
    name: Post Summary
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      # Resolve the source CI Orchestrator run ID and PR metadata.
      # For workflow_run events, PR metadata comes from the event payload
      # (the REST API returns empty .pull_requests[] for cross-repo fork PRs).
      - name: Resolve source run
        id: source-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
              echo "::error::Invalid pr_number input: must be a positive integer, got: '$PR_NUMBER'"
              exit 1
            fi

            # Get the PR's head SHA to find the CI Orchestrator run
            HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.head.sha')

            # Find the latest CI Orchestrator run for this commit (success or failure)
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/ci-orchestrator.yml/runs?head_sha=$HEAD_SHA&per_page=1" \
              --jq '.workflow_runs[0].id')

            if [ -z "$RUN_ID" ] || [ "$RUN_ID" == "null" ]; then
              echo "::error::No CI Orchestrator run found for PR #$PR_NUMBER (SHA $HEAD_SHA)."
              exit 1
            fi
            echo "Found CI Orchestrator run $RUN_ID for PR #$PR_NUMBER"
          else
            RUN_ID="${{ github.event.workflow_run.id }}"
            PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
            HEAD_SHA="${{ github.event.workflow_run.pull_requests[0].head.sha || github.event.workflow_run.head_sha }}"

            # workflow_run.pull_requests is empty for fork PRs (renovate-bot, dependabot, etc.).
            # Fall back to searching for a PR matching the head branch.
            if [ -z "$PR_NUMBER" ] && [ "${{ github.event.workflow_run.event }}" == "pull_request" ]; then
              PR_NUMBER=$(gh pr list \
                --repo "${{ github.repository }}" \
                --head "$HEAD_BRANCH" \
                --json number,headRefOid \
                --jq ".[] | select(.headRefOid == \"$HEAD_SHA\") | .number")
              echo "Resolved PR #$PR_NUMBER from head branch (fork PR fallback)"
            fi
          fi

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "source_run_url=https://github.com/${{ github.repository }}/actions/runs/$RUN_ID" >> $GITHUB_OUTPUT
          echo "summary_run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT

          if [ -n "$PR_NUMBER" ]; then
            echo "Found PR #$PR_NUMBER at SHA $HEAD_SHA"
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "No associated PR found for run $RUN_ID; PR comment will be skipped."
          fi

      # Download only the ci-summary artifact (pre-computed by ci-summary-report.yml).
      - name: Download CI summary artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download "${{ steps.source-run.outputs.run_id }}" \
            --repo "${{ github.repository }}" \
            --name ci-summary \
            --dir .artifacts \
          || echo "::warning::ci-summary artifact not found; proceeding without summary artifact (later checks may fail)."

      # All display text is constructed here from structured data, never from
      # free-form artifact content, to prevent injection via crafted test output.
      - name: Post PR comment and create check runs
        if: steps.source-run.outputs.head_sha
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;

            const headSha     = '${{ steps.source-run.outputs.head_sha }}';
            const prNumber    = parseInt('${{ steps.source-run.outputs.pr_number }}', 10) || null;
            const ciRunUrl    = '${{ steps.source-run.outputs.source_run_url }}';
            const publishUrl  = '${{ steps.source-run.outputs.summary_run_url }}';
            const links       = `➡️ [View CI run](${ciRunUrl}) | [View publish logs](${publishUrl})`;

            // Read structured data written by ci-summary-report.yml.
            // All fields are primitives (enums, numbers, booleans) — no free-form text.
            let s;
            try {
              s = JSON.parse(fs.readFileSync('.artifacts/ci-summary.json', 'utf8'));
            } catch (e) {
              core.warning(`ci-summary.json not found or unparseable: ${e.message}`);
              // Post failing check runs so required status checks are never silently absent.
              // All text here is a trusted, fixed string — no artifact content is used.
              const errorSummary = 'ci-summary artifact missing or unparseable; check CI run logs.';
              for (const name of ['Metrics Comparison', 'Coverage Gate']) {
                await github.rest.checks.create({
                  owner, repo, head_sha: headSha,
                  name,
                  status: 'completed',
                  conclusion: 'failure',
                  output: { title: name, summary: errorSummary, text: links },
                });
              }
              return;
            }

            // Coerce every field to its expected primitive type immediately.
            // String fields are used only for enum comparisons, never interpolated into output.
            // Numbers are validated with Number.isFinite(); invalid values fall back to null.
            const safeInt = v => { if (v === null || v === undefined) return null; const n = Math.trunc(Number(v)); return Number.isFinite(n) && n >= 0 ? n : null; };
            const safeNum = v => { if (v === null || v === undefined) return null; const n = Number(v);             return Number.isFinite(n) && n >= 0 ? n : null; };

            const hasInfraErrors     = s.metrics_has_infra_errors === true;
            const totalChanges       = safeInt(s.metrics_total_changes);
            // Derive conclusion from the same conditions that drive metricsText,
            // not from s.metrics_conclusion, so the two are always consistent.
            const metricsConclusion  = (hasInfraErrors || totalChanges === null || totalChanges > 0) ? 'failure' : 'success';
            const coverageSkipped    = s.coverage_skipped === true || s.coverage_conclusion === 'skipped';
            const coverageConclusion = (coverageSkipped || s.coverage_conclusion === 'success') ? 'success' : 'failure';
            const coveragePct        = safeNum(s.coverage_percentage);
            const coverageBaseline   = safeNum(s.coverage_baseline);

            // ── Metrics ──────────────────────────────────────────────────────────
            let metricsText;
            if (hasInfraErrors) {
              metricsText = '❌ Infrastructure error: missing diff artifacts';
            } else if (totalChanges === null) {
              metricsText = '❌ Could not read metrics_total_changes from summary';
            } else if (totalChanges > 0) {
              metricsText = `❌ ${totalChanges} metric change(s) detected`;
            } else {
              metricsText = '✅ No significant metric changes';
            }

            // ── Coverage ─────────────────────────────────────────────────────────
            let coverageText;
            if (coverageSkipped) {
              coverageText = '⏭️ No coverage profiles found; coverage gate skipped.';
            } else {
              const pct      = coveragePct      !== null ? `${coveragePct}%`      : 'unknown';
              const baseline = coverageBaseline !== null ? ` (baseline ${coverageBaseline}%)` : ' (no baseline)';
              const icon     = coverageConclusion === 'success' ? '✅' : '❌';
              coverageText   = `${icon} Coverage ${pct}${baseline}`;
            }

            // ── Check runs ───────────────────────────────────────────────────────
            await github.rest.checks.create({
              owner, repo, head_sha: headSha,
              name: 'Metrics Comparison',
              status: 'completed',
              conclusion: metricsConclusion,
              output: {
                title:   'Metrics Comparison Result',
                summary: metricsText,
                text:    `Total changes across all snapshots: ${totalChanges ?? 'unknown'}\n\n${links}`,
              },
            });

            // Always created so it can be used as a required status check.
            await github.rest.checks.create({
              owner, repo, head_sha: headSha,
              name: 'Coverage Gate',
              status: 'completed',
              conclusion: coverageConclusion,
              output: {
                title:   'Coverage Gate',
                summary: coverageText,
                text:    links,
              },
            });

            // ── PR comment (only when there is something to report) ───────────────
            const hasIssues = metricsConclusion === 'failure' || coverageConclusion === 'failure'
                              || totalChanges > 0;
            if (!prNumber || !hasIssues) return;

            const tag  = '<!-- ci-summary-report -->';
            const body = [
              tag,
              '## CI Summary Report',
              '',
              '### Metrics Comparison',
              metricsText,
              '',
              '### Code Coverage',
              coverageText,
              '',
              links,
            ].join('\n');

            const existing = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber,
            }).then(cs => cs.find(c => c.body && c.body.startsWith(tag)));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
