# E2E integration tests for Service Performance Monitoring (SPM), verifying
# that span metrics are correctly derived and served via the metrics API,
# with Prometheus, Elasticsearch, OpenSearch, and ClickHouse as the metrics store.

name: Test SPM

on:
  workflow_call:

# See https://github.com/ossf/scorecard/blob/main/docs/checks.md#token-permissions
permissions:
  contents: read

jobs:
  spm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode:
        - metricstore: prometheus
        - metricstore: elasticsearch
        - metricstore: opensearch
        - metricstore: clickhouse

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

    - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      with:
        submodules: true

    - name: Fetch git tags
      run: |
        git fetch --prune --unshallow --tags

    - uses: ./.github/actions/setup-go
      with:
        go-version: 1.26.x

    - name: Setup Node.js version
      uses: ./.github/actions/setup-node.js

    - name: Run SPM Test
      run:  bash scripts/e2e/spm.sh -m ${{ matrix.mode.metricstore }}

    - uses: ./.github/actions/verify-metrics-snapshot
      with:
        snapshot: metrics_snapshot_spm_${{ matrix.mode.metricstore }}
        artifact_key: metrics_snapshot_spm_${{ matrix.mode.metricstore }}

