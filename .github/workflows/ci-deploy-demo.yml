name: Deploy Jaeger Demo to OKE

on:
  schedule:
    - cron: '0 13 * * *'  # Daily at 8:00 AM US Eastern Time (ET)
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Snapshot image tag to deploy for both images. Defaults to the workflow SHA.'
        required: false
      jaeger_image_tag:
        description: 'Jaeger snapshot image tag override. Defaults to image_tag or the workflow SHA.'
        required: false
      hotrod_image_tag:
        description: 'HotROD snapshot image tag override. Defaults to image_tag or the workflow SHA.'
        required: false
      deploy_mode:
        description: 'Deployment mode. Defaults to upgrade; use clean only to reinstall the demo.'
        required: false
        default: upgrade
        type: choice
        options:
          - upgrade
          - clean
      demo_stack:
        description: 'Demo stack to deploy. Defaults to the original OCI demo.'
        required: false
        default: oci
        type: choice
        options:
          - oci
          - otel
          - all

permissions: read-all

jobs:
  deploy:
    name: Deploy Jaeger to OKE Cluster
    runs-on: ubuntu-latest
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      JAEGER_DEMO_JAEGER_IMAGE_REPOSITORY: jaegertracing/jaeger-snapshot
      JAEGER_DEMO_HOTROD_IMAGE_REPOSITORY: jaegertracing/example-hotrod-snapshot
      JAEGER_DEMO_IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
      JAEGER_DEMO_JAEGER_IMAGE_TAG: ${{ github.event.inputs.jaeger_image_tag || github.event.inputs.image_tag || github.sha }}
      JAEGER_DEMO_HOTROD_IMAGE_TAG: ${{ github.event.inputs.hotrod_image_tag || github.event.inputs.image_tag || github.sha }}
      JAEGER_DEMO_IMAGE_PULL_POLICY: Always
      JAEGER_DEMO_DEPLOY_MODE: ${{ github.event.inputs.deploy_mode || 'upgrade' }}
      JAEGER_DEMO_STACK: ${{ github.event.inputs.demo_stack || 'oci' }}
      RUN_PUBLIC_SMOKE_TESTS: "true"

    steps:
    - name: Configure kubectl with OKE
      uses: oracle-actions/configure-kubectl-oke@77a733d79446dabe7bf0e58eb56197d33ce4dc58 # v1.5.0
      with:
        cluster: ${{ secrets.OKE_CLUSTER_OCID }}
        enablePrivateEndpoint: false

    - name: Install Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

    - name: Checkout jaeger repository
      uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6

    - name: Deploy using appropriate script
      run: |
        echo "🔄 Deploying demo stack ${JAEGER_DEMO_STACK} in ${JAEGER_DEMO_DEPLOY_MODE} mode"
        echo "🔄 Deploying Jaeger snapshot image tag ${JAEGER_DEMO_JAEGER_IMAGE_TAG}"
        echo "🔄 Deploying HotROD snapshot image tag ${JAEGER_DEMO_HOTROD_IMAGE_TAG}"

        case "${JAEGER_DEMO_STACK}" in
          oci)
            bash ./examples/oci/deploy-all.sh "${JAEGER_DEMO_DEPLOY_MODE}"
            ;;
          otel)
            bash ./examples/otel-demo/deploy-all.sh "${JAEGER_DEMO_DEPLOY_MODE}" "${JAEGER_DEMO_JAEGER_IMAGE_TAG}"
            ;;
          all)
            bash ./examples/oci/deploy-all.sh "${JAEGER_DEMO_DEPLOY_MODE}"
            bash ./examples/otel-demo/deploy-all.sh "${JAEGER_DEMO_DEPLOY_MODE}" "${JAEGER_DEMO_JAEGER_IMAGE_TAG}"
            ;;
          *)
            echo "Unsupported demo stack: ${JAEGER_DEMO_STACK}"
            exit 1
            ;;
        esac

    - name: Send detailed Slack notification on failure
      if: failure()
      uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2.4.0
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_CHANNEL: '#jaeger-operations'
        SLACK_COLOR: danger
        SLACK_USERNAME: 'Jaeger CI Bot'
        SLACK_ICON_EMOJI: ':warning:'
        SLACK_TITLE: '🚨 Jaeger OKE Deployment Failed'
        SLACK_MESSAGE: |
          *Repository:* ${{ github.repository }}
          *Workflow:* ${{ github.workflow }}
          *Run ID:* ${{ github.run_id }}
          *Trigger:* ${{ github.event_name }}
          *Actor:* ${{ github.actor }}

          <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔗 View Failed Run>
        SLACK_FOOTER: 'Jaeger CI/CD Pipeline'
