name: Build all-in-one

on:
  workflow_call:

permissions:
  contents: read
  packages: read  # This allows the runner to pull from GHCR

jobs:
  all-in-one:
    runs-on: ubuntu-latest
    timeout-minutes: 40 # snapshot builds do a full npm build of jaeger-ui (+~5min vs PR builds)

    steps:
    - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

    - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      with:
        submodules: true

    - name: Fetch git tags
      run: git fetch --prune --unshallow --tags

    - uses: ./.github/actions/setup-go
      with:
        go-version: 1.26.x

    - name: Log in to GHCR
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Check out latest jaeger-ui/main for snapshot build
      if: github.event_name == 'push' && github.ref_name == 'main'
      run: bash scripts/build/checkout-ui-for-snapshot.sh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - uses: ./.github/actions/setup-node.js

    - uses: ./.github/actions/setup-branch

    - run: make install-ci

    - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

    - name: Define BUILD_FLAGS var if running on a Pull Request or Merge Queue
      run: |
        case ${GITHUB_EVENT_NAME} in
          pull_request|merge_group)
            echo "BUILD_FLAGS=-l -p linux/$(go env GOARCH)" >> ${GITHUB_ENV}
            ;;
          *)
            echo "BUILD_FLAGS=" >> ${GITHUB_ENV}
            ;;
        esac

    - name: Build, test, and publish all-in-one image
      if: github.event_name == 'push' && github.ref_name == 'main'
      run: |
        bash scripts/build/build-all-in-one-image.sh ${{ env.BUILD_FLAGS }} v2
      env:
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}

    - name: Build and test all-in-one image (no publish)
      if: github.event_name != 'push' || github.ref_name != 'main'
      run: |
        bash scripts/build/build-all-in-one-image.sh ${{ env.BUILD_FLAGS }} v2
