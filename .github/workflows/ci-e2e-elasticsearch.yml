# Integration tests for Elasticsearch storage backend, covering major versions 6.x through 9.x.
# direct: classic tests at the storage API layer, directly instantiating the storage implementation.
# e2e: multi-process E2E tests via the trace ingestion and query APIs.

name: CIT Elasticsearch

on:
  workflow_call:
    inputs:
      backward_compatibility_env:
        type: boolean
        required: false
        default: false

# See https://github.com/ossf/scorecard/blob/main/docs/checks.md#token-permissions
permissions:  # added using https://github.com/step-security/secure-workflows
  contents: read

jobs:
  elasticsearch:
    if: ${{ !inputs.backward_compatibility_env || matrix.version.storage_test == 'e2e' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
        - major: 6.x
          distribution: elasticsearch
          storage_test: direct
        - major: 7.x
          distribution: elasticsearch
          storage_test: direct
        - major: 8.x
          distribution: elasticsearch
          storage_test: direct
        - major: 8.x
          distribution: elasticsearch
          storage_test: e2e
        - major: 9.x
          distribution: elasticsearch
          storage_test: direct
        - major: 9.x
          distribution: elasticsearch
          storage_test: e2e
    name: ${{ matrix.version.distribution }} ${{ matrix.version.major }} ${{ matrix.version.storage_test }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: true

    - uses: ./.github/actions/setup-go
      with:
        go-version: 1.26.x

    - name: time settings
      run: |
        date
        echo TZ="$TZ"

    - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
    - name: Run ${{ matrix.version.distribution }} integration tests
      id: test-execution
      run: bash scripts/e2e/elasticsearch.sh ${{ matrix.version.distribution }} ${{ matrix.version.major }} ${{ matrix.version.storage_test }} ${{ inputs.backward_compatibility_env }}

    - uses: ./.github/actions/verify-metrics-snapshot
      if: ${{ matrix.version.storage_test == 'e2e' && !inputs.backward_compatibility_env }}
      with:
        snapshot: metrics_snapshot_elasticsearch
        artifact_key: metrics_snapshot_elasticsearch_${{ matrix.version.major }}_${{ matrix.version.storage_test }}

    - name: Upload coverage to codecov
      uses: ./.github/actions/upload-codecov
      with:
        files: cover.out
        flag: ${{ matrix.version.distribution }}-${{ matrix.version.major }}-${{ matrix.version.storage_test }}

